<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Context Doctor Report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #657386;
      --line: #d8dee8;
      --healthy: #159447;
      --healthy-soft: #e9f8ef;
      --critical: #8b1111;
      --high: #cf2929;
      --medium: #d97706;
      --low: #c6a400;
      --blue: #2563eb;
      --shadow: 0 12px 32px rgba(23, 32, 42, 0.08);
      --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(220px, 300px) 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .score {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 20px;
      min-height: 184px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .score-number {
      font-size: 56px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .tier {
      display: inline-flex;
      width: fit-content;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .tier.healthy { color: #0c6b32; background: var(--healthy-soft); }
    .tier.caution { color: #8a6200; background: #fff5cc; }
    .tier.critical { color: var(--critical); background: #fde8e8; }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item, .count-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 4px;
    }

    .value {
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .language-select {
      width: 100%;
      margin-top: 4px;
    }

    .counts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .count-card strong {
      font-size: 24px;
      display: block;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(247, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .toolbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 24px;
      display: grid;
      grid-template-columns: 1fr 180px 160px;
      gap: 10px;
    }

    input, select, button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }

    button {
      cursor: pointer;
      font-weight: 650;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .message {
      position: relative;
      margin-left: 36px;
      background: var(--panel);
      border: 2px solid var(--healthy);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(23, 32, 42, 0.05);
      padding: 13px 14px 12px;
      min-width: 0;
    }

    .message::before {
      content: "";
      position: absolute;
      left: -28px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--healthy);
      border: 3px solid var(--bg);
    }

    .message.flag-critical { border-color: var(--critical); }
    .message.flag-high { border-color: var(--high); }
    .message.flag-medium { border-color: var(--medium); }
    .message.flag-low { border-color: var(--low); }
    .message.flag-critical::before { background: var(--critical); }
    .message.flag-high::before { background: var(--high); }
    .message.flag-medium::before { background: var(--medium); }
    .message.flag-low::before { background: var(--low); }

    .message.hidden { display: none; }

    .message-head {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-right: 118px;
      min-height: 24px;
    }

    .role {
      color: #ffffff;
      background: #334155;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 750;
    }

    .role.user { background: #2563eb; }
    .role.assistant { background: #475569; }
    .role.tool_call { background: #7c3aed; }
    .role.tool_result { background: #0f766e; }
    .role.system { background: #9a3412; }

    .message-id {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      max-width: 104px;
      border-radius: 6px;
      color: #ffffff;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }

    .badge.critical { background: var(--critical); }
    .badge.high { background: var(--high); }
    .badge.medium { background: var(--medium); }
    .badge.low { background: var(--low); color: #2f2500; }

    pre {
      margin: 10px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #1f2937;
    }

    .collapsed pre {
      max-height: 220px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .expand-row {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chars {
      color: var(--muted);
      font-size: 12px;
    }

    .evidence {
      display: none;
      position: absolute;
      z-index: 4;
      right: 10px;
      top: 42px;
      width: min(420px, calc(100vw - 64px));
      background: #111827;
      color: #f8fafc;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      font-size: 13px;
    }

    .message.flagged:hover .evidence,
    .message.flagged:focus-within .evidence {
      display: block;
    }

    .evidence strong {
      display: block;
      margin-top: 8px;
      color: #ffffff;
    }

    .empty {
      border: 1px dashed var(--line);
      background: #ffffff;
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .top, .meta, .toolbar-inner {
        grid-template-columns: 1fr;
      }
      .counts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .message-head {
        padding-right: 0;
        flex-wrap: wrap;
      }
      .badge {
        position: static;
        margin-top: 8px;
        display: inline-block;
        max-width: 100%;
      }
      .evidence {
        position: static;
        display: block;
        width: 100%;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <script id="contextdoctor-data" type="application/json">__CONTEXT_DOCTOR_DATA__</script>
  <header>
    <div class="wrap">
      <div class="top">
        <section class="score" aria-label="Health score">
          <div class="label" id="healthLabel">Context Health</div>
          <div class="score-number" id="scoreNumber">0</div>
          <span class="tier" id="tierPill">Healthy</span>
        </section>
        <section class="meta" aria-label="Report metadata">
          <div class="meta-item">
            <div class="label" id="frameworkLabel">Framework</div>
            <div class="value" id="framework"></div>
          </div>
          <div class="meta-item">
            <div class="label" id="generatedLabel">Generated</div>
            <div class="value" id="generatedAt"></div>
          </div>
          <div class="meta-item">
            <div class="label" id="transcriptLabel">Transcript</div>
            <div class="value" id="transcriptPath"></div>
          </div>
          <div class="meta-item">
            <div class="label" id="scopeLabel">Scope</div>
            <div class="value" id="scope"></div>
          </div>
          <div class="meta-item">
            <label class="label" id="languageLabel" for="languageSelect">Language</label>
            <select id="languageSelect" class="language-select" aria-label="Report language">
              <option value="en">English</option>
              <option value="zh">简体中文</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
            </select>
          </div>
        </section>
      </div>
      <section class="counts" id="counts" aria-label="Pollution counts"></section>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <input id="search" type="search" placeholder="Search timeline">
      <select id="categoryFilter" aria-label="Filter by category"></select>
      <select id="severityFilter" aria-label="Filter by severity"></select>
    </div>
  </div>

  <main class="wrap">
    <section class="timeline" id="timeline" aria-label="Conversation timeline"></section>
    <div class="empty" id="empty" hidden>No messages match the current filters.</div>
  </main>

  <script>

    const $ = (id) => document.getElementById(id);
    const categoryFilter = $('categoryFilter');
    const severityFilter = $('severityFilter');
    const languageSelect = $('languageSelect');
    const search = $('search');
    const timeline = $('timeline');
    const empty = $('empty');
    const TRANSLATIONS = {

          filterByCategory: '按污染类别筛选',
          filterBySeverity: '按严重等级筛选',
          pollutionCounts: '污染统计',
          conversationTimeline: '会话时间线',
          allCategories: '全部类别',

          healthyOnly: '仅看健康消息',
          suggestedFix: '建议修复',

          expand: '展开',

        categories: {

          tool_noise: '工具噪音',
          task_drift: '任务漂移',

        }

          emptyMessageText: '（空のメッセージ）',
          focus: 'focus'
        },
        tiers: { healthy: '健全', caution: '注意', critical: '危険' },
        severities: { critical: '危険', high: '高', medium: '中', low: '低' },
        categories: {
          stale_state: '古い状態',
          conflicting_instructions: '指示の衝突',
          tool_noise: 'ツールノイズ',
          task_drift: 'タスク漂流',
          hallucinated_facts: '誤情報',
          scope_bloat: 'スコープ肥大',
          persona_drift: 'ペルソナ逸脱',
          skill_conflict: 'スキル衝突'
        }
      },
      ko: {
        ui: {
          contextHealth: '컨텍스트 건강도',
          framework: '프레임워크',
          generated: '생성 시간',
          transcript: 'Transcript',
          scope: '범위',
          language: '언어',
          searchTimeline: '타임라인 검색',
          filterByCategory: '카테고리로 필터',
          filterBySeverity: '심각도로 필터',
          pollutionCounts: '오염 카운트',
          conversationTimeline: '대화 타임라인',
          allCategories: '모든 카테고리',
          flaggedOnly: '표시된 항목만',
          allSeverities: '모든 심각도',
          healthyOnly: '정상 메시지만',
          suggestedFix: '수정 제안',
          evidence: '근거',
          expand: '펼치기',
          collapse: '접기',
          chars: '자',
          emptyMessage: '현재 필터와 일치하는 메시지가 없습니다.',
          emptyMessageText: '(빈 메시지)',
          focus: 'focus'
        },
        tiers: { healthy: '정상', caution: '주의', critical: '위험' },
        severities: { critical: '위험', high: '높음', medium: '중간', low: '낮음' },
        categories: {
          stale_state: '오래된 상태',
          conflicting_instructions: '지시 충돌',
          tool_noise: '도구 노이즈',
          task_drift: '작업 이탈',
          hallucinated_facts: '환각 사실',
          scope_bloat: '범위 비대',
          persona_drift: '페르소나 이탈',
          skill_conflict: '스킬 충돌'
        }
      }
    };
    let currentLanguage = normalizeLanguage(DATA.reportLanguage || 'en');

    function text(value) {
      return value == null ? '' : String(value);
    }

    function escapeHtml(value) {
      return text(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function titleCase(value) {
      return text(value).replaceAll('_', ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function normalizeLanguage(value) {
      const normalized = text(value).toLowerCase();
      if (normalized.startsWith('zh')) return 'zh';
      if (normalized.startsWith('ja')) return 'ja';
      if (normalized.startsWith('ko')) return 'ko';
      return 'en';
    }

    function locale() {
      return TRANSLATIONS[currentLanguage] || TRANSLATIONS.en;
    }

    function ui(key) {
      return locale().ui[key] || TRANSLATIONS.en.ui[key] || key;
    }

    function categoryLabel(key) {
      return locale().categories[key] || DATA.categories[key]?.label || titleCase(key);
    }

    function severityLabel(key) {
      return locale().severities[key] || titleCase(key);
    }

    function tierLabel(key) {
      return locale().tiers[key] || titleCase(key);
    }

    function scopeText() {
      return DATA.scope + (DATA.focus ? `, ${ui('focus')}: ${categoryLabel(DATA.focus)}` : '');
    }

    function renderTop() {
      document.documentElement.lang = currentLanguage;
      $('healthLabel').textContent = ui('contextHealth');
      $('scoreNumber').textContent = DATA.score;
      $('tierPill').textContent = tierLabel(DATA.tier);
      $('tierPill').className = `tier ${DATA.tier}`;
      $('frameworkLabel').textContent = ui('framework');
      $('generatedLabel').textContent = ui('generated');
      $('transcriptLabel').textContent = ui('transcript');
      $('scopeLabel').textContent = ui('scope');
      $('languageLabel').textContent = ui('language');
      $('framework').textContent = DATA.frameworkLabel || DATA.framework;
      $('generatedAt').textContent = new Date(DATA.generatedAt).toLocaleString(currentLanguage === 'en' ? undefined : currentLanguage);
      $('transcriptPath').textContent = DATA.transcriptPath;
      $('scope').textContent = scopeText();
      languageSelect.value = currentLanguage;
      search.placeholder = ui('searchTimeline');
      categoryFilter.setAttribute('aria-label', ui('filterByCategory'));
      severityFilter.setAttribute('aria-label', ui('filterBySeverity'));
      $('counts').setAttribute('aria-label', ui('pollutionCounts'));
      $('timeline').setAttribute('aria-label', ui('conversationTimeline'));
      empty.textContent = ui('emptyMessage');

      const counts = $('counts');
      counts.innerHTML = Object.entries(DATA.categories).map(([key, category]) => `
        <div class="count-card" data-category="${key}">
          <div class="label">${escapeHtml(categoryLabel(key))}</div>
          <strong>${DATA.countsByCategory[key] || 0}</strong>
        </div>
      `).join('');

      categoryFilter.innerHTML = [
        `<option value="all">${escapeHtml(ui('allCategories'))}</option>`,
        `<option value="flagged">${escapeHtml(ui('flaggedOnly'))}</option>`,
        ...Object.keys(DATA.categories).map((key) => `<option value="${key}">${escapeHtml(categoryLabel(key))}</option>`)
      ].join('');

      severityFilter.innerHTML = [
        `<option value="all">${escapeHtml(ui('allSeverities'))}</option>`,
        `<option value="critical">${escapeHtml(severityLabel('critical'))}</option>`,
        `<option value="high">${escapeHtml(severityLabel('high'))}</option>`,
        `<option value="medium">${escapeHtml(severityLabel('medium'))}</option>`,
        `<option value="low">${escapeHtml(severityLabel('low'))}</option>`,
        `<option value="healthy">${escapeHtml(ui('healthyOnly'))}</option>`
      ].join('');
    }

    function renderTimeline() {
      timeline.innerHTML = DATA.messages.map((message) => {
        const finding = message.finding;
        const flaggedClass = finding ? `flagged flag-${finding.severity}` : '';
        const badge = finding ? `<div class="badge ${finding.severity}">${escapeHtml(categoryLabel(finding.type))}</div>` : '';
        const evidence = finding ? `
          <aside class="evidence">
            <div><strong>${escapeHtml(severityLabel(finding.severity))}</strong>${escapeHtml(finding.reason)}</div>
            <strong>${escapeHtml(ui('suggestedFix'))}</strong>
            <div>${escapeHtml(finding.fix)}</div>
            ${finding.evidence ? `<strong>${escapeHtml(ui('evidence'))}</strong><div>${escapeHtml(finding.evidence)}</div>` : ''}
          </aside>
        ` : '';
        const long = message.charCount > 2400 || ['tool_result', 'tool_call'].includes(message.kind);
        return `
          <article class="message ${flaggedClass} ${long ? 'collapsed' : ''}"
            tabindex="0"
            data-category="${finding ? finding.type : 'healthy'}"
            data-severity="${finding ? finding.severity : 'healthy'}"
            data-search="${escapeHtml([message.id, message.role, message.kind, message.toolName, message.text].join(' ').toLowerCase())}">
            ${badge}
            <div class="message-head">
              <span class="role ${escapeHtml(message.role)}">${escapeHtml(message.role)}</span>
              <span class="message-id">${escapeHtml(message.id)} · ${escapeHtml(message.kind)}${message.toolName ? ` · ${escapeHtml(message.toolName)}` : ''}</span>
            </div>
            <pre>${escapeHtml(message.text || ui('emptyMessageText'))}</pre>
            ${long ? `<div class="expand-row"><button type="button" data-expand>${escapeHtml(ui('expand'))}</button><span class="chars">${message.charCount.toLocaleString()} ${escapeHtml(ui('chars'))}</span></div>` : ''}
            ${evidence}
          </article>
        `;
      }).join('');
      timeline.querySelectorAll('[data-expand]').forEach((button) => {
        button.addEventListener('click', () => {
          const card = button.closest('.message');
          const collapsed = card.classList.toggle('collapsed');
          button.textContent = collapsed ? ui('expand') : ui('collapse');
        });
      });
    }

    function applyFilters() {
      const category = categoryFilter.value;
      const severity = severityFilter.value;
      const needle = search.value.trim().toLowerCase();
      let shown = 0;
      timeline.querySelectorAll('.message').forEach((card) => {
        const cardCategory = card.dataset.category;
        const cardSeverity = card.dataset.severity;
        const categoryOk = category === 'all'
          || (category === 'flagged' && cardCategory !== 'healthy')
          || cardCategory === category;
        const severityOk = severity === 'all' || cardSeverity === severity;
        const searchOk = !needle || card.dataset.search.includes(needle);
        const visible = categoryOk && severityOk && searchOk;
        card.classList.toggle('hidden', !visible);
        if (visible) shown += 1;
      });
      empty.hidden = shown !== 0;
    }

    renderTop();
    renderTimeline();
    applyFilters();
    categoryFilter.addEventListener('change', applyFilters);
    severityFilter.addEventListener('change', applyFilters);
    search.addEventListener('input', applyFilters);
    languageSelect.addEventListener('change', () => {
      currentLanguage = normalizeLanguage(languageSelect.value);
      const selectedCategory = categoryFilter.value;
      const selectedSeverity = severityFilter.value;
      renderTop();
      categoryFilter.value = selectedCategory;
      severityFilter.value = selectedSeverity;
      renderTimeline();
      applyFilters();
    });
  </script>
</body>
</html>
