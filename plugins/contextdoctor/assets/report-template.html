<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Context Doctor Report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #657386;
      --line: #d8dee8;
      --healthy: #159447;
      --healthy-soft: #e9f8ef;
      --critical: #8b1111;
      --high: #cf2929;
      --medium: #d97706;
      --low: #c6a400;
      --blue: #2563eb;
      --shadow: 0 12px 32px rgba(23, 32, 42, 0.08);
      --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(220px, 300px) 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .score {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 20px;
      min-height: 184px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .score-number {
      font-size: 56px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .tier {
      display: inline-flex;
      width: fit-content;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .tier.healthy { color: #0c6b32; background: var(--healthy-soft); }
    .tier.caution { color: #8a6200; background: #fff5cc; }
    .tier.critical { color: var(--critical); background: #fde8e8; }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item, .count-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 4px;
    }

    .value {
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .counts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .count-card strong {
      font-size: 24px;
      display: block;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(247, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .toolbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 24px;
      display: grid;
      grid-template-columns: 1fr 180px 160px;
      gap: 10px;
    }

    input, select, button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }

    button {
      cursor: pointer;
      font-weight: 650;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .message {
      position: relative;
      margin-left: 36px;
      background: var(--panel);
      border: 2px solid var(--healthy);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(23, 32, 42, 0.05);
      padding: 13px 14px 12px;
      min-width: 0;
    }

    .message::before {
      content: "";
      position: absolute;
      left: -28px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--healthy);
      border: 3px solid var(--bg);
    }

    .message.flag-critical { border-color: var(--critical); }
    .message.flag-high { border-color: var(--high); }
    .message.flag-medium { border-color: var(--medium); }
    .message.flag-low { border-color: var(--low); }
    .message.flag-critical::before { background: var(--critical); }
    .message.flag-high::before { background: var(--high); }
    .message.flag-medium::before { background: var(--medium); }
    .message.flag-low::before { background: var(--low); }

    .message.hidden { display: none; }

    .message-head {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-right: 118px;
      min-height: 24px;
    }

    .role {
      color: #ffffff;
      background: #334155;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 750;
    }

    .role.user { background: #2563eb; }
    .role.assistant { background: #475569; }
    .role.tool_call { background: #7c3aed; }
    .role.tool_result { background: #0f766e; }
    .role.system { background: #9a3412; }

    .message-id {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      max-width: 104px;
      border-radius: 6px;
      color: #ffffff;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }

    .badge.critical { background: var(--critical); }
    .badge.high { background: var(--high); }
    .badge.medium { background: var(--medium); }
    .badge.low { background: var(--low); color: #2f2500; }

    pre {
      margin: 10px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #1f2937;
    }

    .collapsed pre {
      max-height: 220px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .expand-row {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chars {
      color: var(--muted);
      font-size: 12px;
    }

    .evidence {
      display: none;
      position: absolute;
      z-index: 4;
      right: 10px;
      top: 42px;
      width: min(420px, calc(100vw - 64px));
      background: #111827;
      color: #f8fafc;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      font-size: 13px;
    }

    .message.flagged:hover .evidence,
    .message.flagged:focus-within .evidence {
      display: block;
    }

    .evidence strong {
      display: block;
      margin-top: 8px;
      color: #ffffff;
    }

    .empty {
      border: 1px dashed var(--line);
      background: #ffffff;
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .top, .meta, .toolbar-inner {
        grid-template-columns: 1fr;
      }
      .counts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .message-head {
        padding-right: 0;
        flex-wrap: wrap;
      }
      .badge {
        position: static;
        margin-top: 8px;
        display: inline-block;
        max-width: 100%;
      }
      .evidence {
        position: static;
        display: block;
        width: 100%;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <script id="contextdoctor-data" type="application/json">__CONTEXT_DOCTOR_DATA__</script>
  <header>
    <div class="wrap">
      <div class="top">
        <section class="score" aria-label="Health score">
          <div class="label">Context Health</div>
          <div class="score-number" id="scoreNumber">0</div>
          <span class="tier" id="tierPill">Healthy</span>
        </section>
        <section class="meta" aria-label="Report metadata">
          <div class="meta-item">
            <div class="label">Framework</div>
            <div class="value" id="framework"></div>
          </div>
          <div class="meta-item">
            <div class="label">Generated</div>
            <div class="value" id="generatedAt"></div>
          </div>
          <div class="meta-item">
            <div class="label">Transcript</div>
            <div class="value" id="transcriptPath"></div>
          </div>
          <div class="meta-item">
            <div class="label">Scope</div>
            <div class="value" id="scope"></div>
          </div>
        </section>
      </div>
      <section class="counts" id="counts" aria-label="Pollution counts"></section>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <input id="search" type="search" placeholder="Search timeline">
      <select id="categoryFilter" aria-label="Filter by category"></select>
      <select id="severityFilter" aria-label="Filter by severity">
        <option value="all">All severities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
        <option value="healthy">Healthy only</option>
      </select>
    </div>
  </div>

  <main class="wrap">
    <section class="timeline" id="timeline" aria-label="Conversation timeline"></section>
    <div class="empty" id="empty" hidden>No messages match the current filters.</div>
  </main>

  <script>
    const DATA = JSON.parse(document.getElementById('contextdoctor-data').textContent);
    const $ = (id) => document.getElementById(id);
    const categoryFilter = $('categoryFilter');
    const severityFilter = $('severityFilter');
    const search = $('search');
    const timeline = $('timeline');
    const empty = $('empty');

    function text(value) {
      return value == null ? '' : String(value);
    }

    function escapeHtml(value) {
      return text(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function titleCase(value) {
      return text(value).replaceAll('_', ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function renderTop() {
      $('scoreNumber').textContent = DATA.score;
      $('tierPill').textContent = titleCase(DATA.tier);
      $('tierPill').className = `tier ${DATA.tier}`;
      $('framework').textContent = DATA.frameworkLabel || DATA.framework;
      $('generatedAt').textContent = new Date(DATA.generatedAt).toLocaleString();
      $('transcriptPath').textContent = DATA.transcriptPath;
      $('scope').textContent = DATA.scope + (DATA.focus ? `, focus: ${DATA.focus}` : '');

      const counts = $('counts');
      counts.innerHTML = Object.entries(DATA.categories).map(([key, category]) => `
        <div class="count-card" data-category="${key}">
          <div class="label">${escapeHtml(category.label)}</div>
          <strong>${DATA.countsByCategory[key] || 0}</strong>
        </div>
      `).join('');

      categoryFilter.innerHTML = [
        '<option value="all">All categories</option>',
        '<option value="flagged">Flagged only</option>',
        ...Object.entries(DATA.categories).map(([key, category]) => `<option value="${key}">${escapeHtml(category.label)}</option>`)
      ].join('');
    }

    function renderTimeline() {
      timeline.innerHTML = DATA.messages.map((message) => {
        const finding = message.finding;
        const flaggedClass = finding ? `flagged flag-${finding.severity}` : '';
        const badge = finding ? `<div class="badge ${finding.severity}">${escapeHtml(DATA.categories[finding.type].label)}</div>` : '';
        const evidence = finding ? `
          <aside class="evidence">
            <div><strong>${escapeHtml(titleCase(finding.severity))}</strong>${escapeHtml(finding.reason)}</div>
            <strong>Suggested fix</strong>
            <div>${escapeHtml(finding.fix)}</div>
            ${finding.evidence ? `<strong>Evidence</strong><div>${escapeHtml(finding.evidence)}</div>` : ''}
          </aside>
        ` : '';
        const long = message.charCount > 2400 || ['tool_result', 'tool_call'].includes(message.kind);
        return `
          <article class="message ${flaggedClass} ${long ? 'collapsed' : ''}"
            tabindex="0"
            data-category="${finding ? finding.type : 'healthy'}"
            data-severity="${finding ? finding.severity : 'healthy'}"
            data-search="${escapeHtml([message.id, message.role, message.kind, message.toolName, message.text].join(' ').toLowerCase())}">
            ${badge}
            <div class="message-head">
              <span class="role ${escapeHtml(message.role)}">${escapeHtml(message.role)}</span>
              <span class="message-id">${escapeHtml(message.id)} · ${escapeHtml(message.kind)}${message.toolName ? ` · ${escapeHtml(message.toolName)}` : ''}</span>
            </div>
            <pre>${escapeHtml(message.text || '(empty message)')}</pre>
            ${long ? `<div class="expand-row"><button type="button" data-expand>Expand</button><span class="chars">${message.charCount.toLocaleString()} chars</span></div>` : ''}
            ${evidence}
          </article>
        `;
      }).join('');
      timeline.querySelectorAll('[data-expand]').forEach((button) => {
        button.addEventListener('click', () => {
          const card = button.closest('.message');
          const collapsed = card.classList.toggle('collapsed');
          button.textContent = collapsed ? 'Expand' : 'Collapse';
        });
      });
    }

    function applyFilters() {
      const category = categoryFilter.value;
      const severity = severityFilter.value;
      const needle = search.value.trim().toLowerCase();
      let shown = 0;
      timeline.querySelectorAll('.message').forEach((card) => {
        const cardCategory = card.dataset.category;
        const cardSeverity = card.dataset.severity;
        const categoryOk = category === 'all'
          || (category === 'flagged' && cardCategory !== 'healthy')
          || cardCategory === category;
        const severityOk = severity === 'all' || cardSeverity === severity;
        const searchOk = !needle || card.dataset.search.includes(needle);
        const visible = categoryOk && severityOk && searchOk;
        card.classList.toggle('hidden', !visible);
        if (visible) shown += 1;
      });
      empty.hidden = shown !== 0;
    }

    renderTop();
    renderTimeline();
    applyFilters();
    categoryFilter.addEventListener('change', applyFilters);
    severityFilter.addEventListener('change', applyFilters);
    search.addEventListener('input', applyFilters);
  </script>
</body>
</html>
